<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Whiteboard</title>
  </head>
  <body>
    <!--
      React mounts itself into this div.
      The entire app UI is generated by JavaScript —
      this file itself stays almost empty.
    -->
    <div id="root"></div>

    <!--
      This script tag is the entry point Vite uses.
      type="module" enables ES module imports (the import/export syntax).
    -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
